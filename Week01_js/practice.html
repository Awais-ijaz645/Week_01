<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Hospital Appointment System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#0b6e99;
color:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 18px;
cursor:pointer;
border:none;
border-radius:5px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

.active{
background:green;
color:white;
}

.completed{
background:#dff0d8;
}

.hidden{
display:none;
}

.dark{
background:#222;
color:white;
}

.dark .card{
background:#333;
color:white;
}

.appointment{
border:1px solid #ddd;
padding:15px;
margin:10px 0;
border-radius:8px;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<header>

<div>

<h1 id="hospitalName">City Hospital</h1>

<p id="hospitalStatus">Hospital Status : OPEN</p>

</div>

<div>

<button id="statusBtn">
Toggle Status
</button>

<button id="themeBtn">
Dark Mode
</button>

</div>

</header>

<div class="card">

<h2>Book Appointment</h2>

<form id="appointmentForm">

<label>Patient Name</label>

<input
type="text"
id="patientName"
placeholder="Enter Patient Name">

<p id="livePreview"></p>

<label>Department</label>

<select id="department">

<option value="">Select Department</option>

<option>Cardiology</option>

<option>Neurology</option>

<option>Orthopedics</option>

<option>Dentistry</option>

</select>

<p id="selectedDepartment"></p>

<label>Appointment Date</label>

<input
type="date"
id="appointmentDate">

<button type="submit">
Book Appointment
</button>

</form>

</div>

<div class="card">

<h2>
Appointments
(<span id="totalAppointments">0</span>)
</h2>

<div id="appointmentList">

<!-- JavaScript will create cards here -->

</div>

</div>

<div class="card">

<h2>DOM Practice Area</h2>

<div id="parentBox">

<h3 id="heading">
Hospital Information
</h3>

<p>
Hospital Open 24 Hours
</p>

<button id="practiceBtn">
Practice Button
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

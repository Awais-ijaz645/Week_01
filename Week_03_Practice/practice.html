<h1>🛒 ShopEasy Dashboard</h1>

<div class="controls">

<input

id="search">

<button onclick="showAll()">
All
</button>

<button onclick="electronics()">
Electronics
</button>

<button onclick="fashion()">
Fashion
</button>

</div>

<div class="stats">

<div class="card">
<h2 id="totalProducts"></h2>
<p>Total Products</p>
</div>

<div class="card">
<h2 id="inventoryValue"></h2>
<p>Inventory Value</p>
</div>

<div class="card">
<h2 id="revenue"></h2>
<p>Total Revenue</p>
</div>

</div>

const products=[

{

category:"Electronics",
price:1000,

sold:120,
rating:4.8,

},

{
id:2,
name:"Phone",
category:"Electronics",
price:700,
stock:8,
sold:80,

},

{
id:3,
name:"Mouse",
category:"Electronics",
price:50,
stock:20,
sold:300,

},

{
id:4,
name:"Shoes",
category:"Fashion",
price:120,
stock:10,
sold:50,
rating:4.5,
image:"https://picsum.photos/300?4"
},

{
id:5,
name:"Watch",
category:"Fashion",
price:250,
stock:15,
sold:90,
rating:4.9,
image:"https://picsum.photos/300?5"
}

];

function displayProducts(data){

const container=document.getElementById("products");

container.innerHTML=data.map(product=>`

<div class="product">

<img src="${product.image}">

<h3>${product.name}</h3>

<p class="price">$${product.price}</p>

<p class="rating">⭐ ${product.rating}</p>

<p>Stock : ${product.stock}</p>

<p>Sold : ${product.sold}</p>

<p class="category">${product.category}</p>

</div>

`).join("");

}

displayProducts(products);



// SEARCH USING FILTER

document.getElementById("search").addEventListener("keyup",function(){

const text=this.value.toLowerCase();

const result=products.filter(product=>{

return product.name.toLowerCase().includes(text);

});

displayProducts(result);

});



// CATEGORY FILTER

function electronics(){

const result=products.filter(product=>{

return product.category==="Electronics";

});

displayProducts(result);

}

function fashion(){

const result=products.filter(product=>{

return product.category==="Fashion";

});

displayProducts(result);

}

function showAll(){

displayProducts(products);

}



// DASHBOARD USING REDUCE

const inventory=products.reduce(function(total,product){

return total+(product.price*product.stock);

},0);

const revenue=products.reduce(function(total,product){

return total+(product.price*product.sold);

},0);

document.getElementById("inventoryValue").innerHTML="$"+inventory;

document.getElementById("revenue").innerHTML="$"+revenue;

document.getElementById("totalProducts").innerHTML=products.length;

</script>

</body>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .top {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        input {
            width: 320px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 12px 22px;
            background: royalblue;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #184fc7;
        }

        #loading {
            text-align: center;
            margin-bottom: 20px;
            color: crimson;
            font-size: 18px;
        }

        #employees {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
        }

        .card h2 {
            margin-bottom: 10px;
            color: royalblue;
        }

        .card p {
            margin: 6px 0;
        }
    </style>
</head>

<body>

    <h1>Employee Directory</h1>

    <div class="top">

        <input
            type="text"
            id="search"
            placeholder="Search employee..."
        >

        <button id="refreshBtn">
            Refresh
        </button>

    </div>

    <p id="loading"></p>

    <div id="employees"></div>

    <script>

        const employeeContainer = document.getElementById("employees");
        const loading = document.getElementById("loading");
        const search = document.getElementById("search");
        const refreshBtn = document.getElementById("refreshBtn");

        let employees = [];

        async function loadEmployees() {

            loading.textContent = "Loading Employees...";

            employeeContainer.innerHTML = "";

            try {

                const response = await fetch(
                    "https://jsonplaceholder.typicode.com/users"
                );

                if (!response.ok) {
                    throw new Error("Failed To Load Employees");
                }

                employees = await response.json();

                showEmployees(employees);

                loading.textContent = "";

            }

            catch (error) {

                loading.textContent = error.message;

            }

        }

        function showEmployees(data) {

            employeeContainer.innerHTML = "";

            data.forEach(employee => {

                employeeContainer.innerHTML += `

                <div class="card">

                    <h2>${employee.name}</h2>

                    <p><strong>Email:</strong> ${employee.email}</p>

                    <p><strong>Phone:</strong> ${employee.phone}</p>

                    <p><strong>Company:</strong> ${employee.company.name}</p>

                    <p><strong>City:</strong> ${employee.address.city}</p>

                </div>

                `;

            });

        }

        search.addEventListener("input", function () {

            const value = search.value.toLowerCase();

            const filtered = employees.filter(employee =>

                employee.name.toLowerCase().includes(value)

            );

            showEmployees(filtered);

        });

        refreshBtn.addEventListener("click", loadEmployees);

        loadEmployees();

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Professional Popup</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 50px; background: #f4f7f6; }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none; 
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transform: translateY(-20px);
      transition: transform 0.3s ease;
      position: relative;
    }

    .modal-header { font-size: 1.5rem; margin-bottom: 15px; color: #333; }
    .close-btn { 
      position: absolute; top: 15px; right: 15px; 
      border: none; background: none; cursor: pointer; font-size: 1.2rem;
    }
    .action-btn { 
      padding: 10px 20px; background: #4a90e2; color: white; 
      border: none; border-radius: 4px; cursor: pointer; margin-top: 20px;
    }

    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-overlay.active .modal-content { transform: translateY(0); }
  </style>
</head>
<body>

  <button id="openModal" class="action-btn">Open Popup</button>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <button class="close-btn" id="closeModal">&times;</button>
      <div class="modal-header">A Pop Up Message </div>
      <p>We hvave show a pop up Message in the diauloge box for the practice..</p>
      <button class="action-btn" id="closeBottom">Close</button>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modalOverlay');
    const openBtn = document.getElementById('openModal');
    const closeBtns = [document.getElementById('closeModal'), document.getElementById('closeBottom')];

    openBtn.addEventListener('click', () => overlay.classList.add('active'));

    const closeModal = () => overlay.classList.remove('active');
    closeBtns.forEach(btn => btn.addEventListener('click', closeModal));

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });
  </script>
</body>
</html>

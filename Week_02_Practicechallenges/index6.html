<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Professional Todo List</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
    .container { width: 100%; max-width: 400px; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
    button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; background: #4a90e2; color: white; transition: 0.2s; }
    button:hover { background: #357abd; }

    ul { list-style: none; padding: 0; }
    .list-item { 
      background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.3s ease;
    }
    .list-item.removing { opacity: 0; transform: translateX(20px); }
    
    .del-btn { background: #e74c3c; padding: 5px 10px; font-size: 12px; }
    .del-btn:hover { background: #c0392b; }
  </style>
</head>
<body>

<div class="container">
  <h3>My Task List</h3>
  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button id="addBtn">Add</button>
  </div>
  <ul id="taskList"></ul>
</div>

<script>
  const input = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const list = document.getElementById('taskList');

  function addTask() {
    if (input.value.trim() === '') return;

    const li = document.createElement('li');
    li.className = 'list-item';
    li.innerHTML = `
      <span>${input.value}</span>
      <button class="del-btn">Delete</button>
    `;

    // Delete Logic
    li.querySelector('.del-btn').addEventListener('click', () => {
      li.classList.add('removing');
      li.addEventListener('transitionend', () => li.remove());
    });

    list.appendChild(li);
    input.value = '';
  }

  addBtn.addEventListener('click', addTask);
  input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });
</script>
</body>
</html>

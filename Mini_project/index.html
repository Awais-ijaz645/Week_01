<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🏥 Hospital</h2>

        <ul>
            <li>Dashboard</li>
            <li>Patients</li>
            <li>Doctors</li>
            <li>Appointments</li>
            <li>Settings</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Header -->
        <header class="header">
            <h1>Hospital Dashboard</h1>

            <button id="addPatientBtn">Add Patient</button>
        </header>

        <!-- Cards -->
        <section class="cards">

            <div class="card">
                <h3>Total Patients</h3>
                <p id="patientCount">0</p>
            </div>

            <div class="card">
                <h3>Total Doctors</h3>
                <p id="doctorCount">10</p>
            </div>

            <div class="card">
                <h3>Appointments</h3>
                <p id="appointmentCount">20</p>
            </div>

            <div class="card">
                <h3>Departments</h3>
                <p>5</p>
            </div>

        </section>

        <!-- Patient Table -->
        <section class="patients">

            <h2>Patient Records</h2>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="patientTable">

                </tbody>

            </table>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>

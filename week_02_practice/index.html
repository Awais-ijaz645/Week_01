<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Hospital</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
     <style>/* ===========================
   CSS Variables
=========================== */

:root{

--primary:#0b6e99;
--secondary:#ffffff;
--bg:#f5f5f5;
--card:#ffffff;
--spacing:1.5rem;
--radius:10px;

}

/* ===========================
   Reset
=========================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;
background:var(--bg);

}

/* ===========================
   Header (Flexbox)
=========================== */

header{

display:flex;
justify-content:space-between;
align-items:center;

background:var(--primary);
padding:var(--spacing);

}

header h1{

color:white;

}

nav{

display:flex;
gap:1.5rem;

}

nav a{

color:white;
text-decoration:none;
transition:.3s;

}

nav a:hover{

color:yellow;

}

/* ===========================
Hero
=========================== */

.hero{

text-align:center;

padding:4rem 10%;

}

.hero button{

margin-top:1rem;

padding:.8rem 1.5rem;

background:var(--primary);

color:white;

border:none;

border-radius:6px;

cursor:pointer;

transition:.4s;

}

/* Transition */

.hero button:hover{

background:#094d6d;

transform:scale(1.05);

}

/* ===========================
Pseudo Elements
=========================== */

.title::before{

content:"🏥 ";

}

.title::after{

content:"";

display:block;

width:80px;

height:3px;

background:var(--primary);

margin-top:8px;

}

/* ===========================
Grid
=========================== */

.departments{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:1.5rem;

padding:2rem 10%;

}

article{

background:var(--card);

padding:2rem;

border-radius:var(--radius);

text-align:center;

box-shadow:0 0 10px rgba(0,0,0,.1);

}

/* ===========================
Animation
=========================== */

.hero h2{

animation:blink 2s infinite;

}

@keyframes blink{

0%{

color:black;

}

50%{

color:red;

}

100%{

color:black;

}

}

/* ===========================
Responsive
=========================== */

@media(max-width:768px){

header{

flex-direction:column;

gap:1rem;

}

nav{

flex-direction:column;

align-items:center;

}

.departments{

grid-template-columns:1fr;

}

.hero{

padding:2rem;

}

}</style>
</head>

<body>

<header>

    <h1 id="Hospital">City Hospital</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Doctors</a>
        <a href="#">Departments</a>
        <a href="#">Contact</a>
    </nav>

</header>

<main>

<section class="hero">

    <h2>24/7 Emergency Services</h2>

    <p>Quality healthcare with experienced doctors.</p>

    <button>Book Appointment</button>

</section>

<section>

<h2 class="title">Our Departments</h2>

<div class="departments">

<article>

<h3>Cardiology</h3>

<p>Heart Specialists</p>

</article>

<article>

<h3>Neurology</h3>

<p>Brain Specialists</p>

</article>

<article>

<h3>Orthopedics</h3>

<p>Bone Specialists</p>

</article>

</div>

</section>

</main>

let hospital = document.getElementById("Hospital")
hospital.innerText = "Care Hospital";
let heading = document.querySelector(".hero h2");

heading.innerText = "Emergency Open 24 Hours";
let par = document.querySelector(".hero p")
par.innerText = "Best doctors available all day."
let title = document.querySelector(".title");

title.parentNode.style.background = "yellow";

btn.parentNode.style.background = "pink";
let heading1 = document.querySelector("article h3");
heading1.parentNode.style.background="orange"

</script>
</body>

</html>
